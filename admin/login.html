<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Portfolio</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
</head>
<body class="login-page">

<div class="login-bg">
    <div class="login-card">
        <!-- Logo -->
        <div class="login-logo">
            <div class="logo-mark">
                <span class="logo-accent">&lt;</span>CM<span class="logo-accent">/&gt;</span>
            </div>
            <p>Administration Panel</p>
        </div>

        <!-- Error -->
        <div id="login-error" class="login-error" style="display:none">
            <i class="fas fa-exclamation-circle"></i>
            <span id="login-error-text">Invalid credentials</span>
        </div>

        <!-- Form -->
        <form id="login-form" class="login-form" novalidate>
            <div class="form-group">
                <label for="login-user"><i class="fas fa-user"></i> Username</label>
                <input id="login-user" type="text" placeholder="Enter username" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label for="login-pass"><i class="fas fa-lock"></i> Password</label>
                <div class="pw-wrap">
                    <input id="login-pass" type="password" placeholder="••••••••" autocomplete="current-password" required>
                    <button type="button" id="toggle-pass" class="pw-toggle" tabindex="-1">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn primary-btn login-btn" id="login-submit">
                <span>Sign In</span> <i class="fas fa-arrow-right"></i>
            </button>
        </form>

        <div class="login-footer">
            <a href="../client/index.html">
                <i class="fas fa-arrow-left"></i> Back to Portfolio
            </a>
        </div>
    </div>
</div>

<script type="module" src="controllers/AuthController.js"></script>
</body>
</html>
